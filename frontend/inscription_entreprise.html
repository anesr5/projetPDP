<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Entreprise — ChercheTonTaff</title>
    <link rel="stylesheet" href="app.css?v=3">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card fade-in">
            <div class="auth-card-header">
                <h1>Créer un compte Entreprise</h1>
                <p>Publiez vos offres et recrutez les meilleurs talents</p>
            </div>
            <div class="auth-card-body">
                <form id="formInscription">
                    <div class="form-group">
                        <label class="form-label" for="name">Nom de l'entreprise</label>
                        <input class="form-control" type="text" id="name" placeholder="Acme Corp" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Adresse email professionnelle</label>
                        <input class="form-control" type="email" id="email" placeholder="contact@entreprise.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="mdp">Mot de passe</label>
                        <input class="form-control" type="password" id="mdp" placeholder="••••••••" required>
                    </div>
                    <div id="messageRetour" style="margin-bottom:0.5rem;"></div>
                    <button type="submit" class="btn btn-primary btn-full btn-lg">Créer mon compte</button>
                </form>
                <div class="auth-footer">
                    Déjà un compte ? <a href="connexion_entreprise.html">Se connecter</a>
                    &nbsp;·&nbsp; <a href="index.html">← Accueil</a>
                </div>
            </div>
        </div>
    </div>
    <script src="inscription_entreprise.js?v=3"></script>
</body>
</html>
