services:
  api:
    build: .
    image: genie-log-api:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://genie_log:genie_log_password@db:5432/genie_log
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: genie_log
      POSTGRES_USER: genie_log
      POSTGRES_PASSWORD: genie_log_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genie_log -d genie_log"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
